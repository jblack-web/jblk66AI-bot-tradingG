# k8s/mongo-statefulset.yaml
# MongoDB StatefulSet with PersistentVolumeClaim
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jblk66ai-mongo
  namespace: jblk66ai
  labels:
    app: jblk66ai-mongo
    app.kubernetes.io/name: jblk66ai
    app.kubernetes.io/component: database
spec:
  serviceName: jblk66ai-mongo
  replicas: 1
  selector:
    matchLabels:
      app: jblk66ai-mongo
  template:
    metadata:
      labels:
        app: jblk66ai-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jblk66ai-secrets
                  key: MONGO_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jblk66ai-secrets
                  key: MONGO_ROOT_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jblk66ai-mongo
  namespace: jblk66ai
  labels:
    app: jblk66ai-mongo
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: jblk66ai-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
