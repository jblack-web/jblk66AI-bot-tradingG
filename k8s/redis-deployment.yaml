# k8s/redis-deployment.yaml
# Redis – Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jblk66ai-redis
  namespace: jblk66ai
  labels:
    app: jblk66ai-redis
    app.kubernetes.io/name: jblk66ai
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jblk66ai-redis
  template:
    metadata:
      labels:
        app: jblk66ai-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jblk66ai-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: jblk66ai-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jblk66ai-redis-pvc
  namespace: jblk66ai
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jblk66ai-redis
  namespace: jblk66ai
  labels:
    app: jblk66ai-redis
spec:
  type: ClusterIP
  selector:
    app: jblk66ai-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
