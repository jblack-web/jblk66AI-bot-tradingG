# k8s/hpa.yaml
# Horizontal Pod Autoscalers for backend and frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jblk66ai-backend-hpa
  namespace: jblk66ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jblk66ai-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jblk66ai-frontend-hpa
  namespace: jblk66ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jblk66ai-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
