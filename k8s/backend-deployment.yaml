# k8s/backend-deployment.yaml
# Backend API – Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jblk66ai-backend
  namespace: jblk66ai
  labels:
    app: jblk66ai-backend
    app.kubernetes.io/name: jblk66ai
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jblk66ai-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jblk66ai-backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/jblack-web/jblk66ai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: jblk66ai-config
            - secretRef:
                name: jblk66ai-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: jblk66ai-backend
  namespace: jblk66ai
  labels:
    app: jblk66ai-backend
spec:
  type: ClusterIP
  selector:
    app: jblk66ai-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
